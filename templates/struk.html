<!DOCTYPE html>
<html>
<head>

<title>Struk</title>

<style>

body{
    font-family: monospace;
    width:300px;
}

</style>

</head>

<body onload="window.print()">

<h3>TOKO POS</h3>

<hr>

<p>ID: {{transaksi.id}}</p>
<p>{{transaksi.created_at}}</p>

<hr>

{% for item in items %}

<p>
{{item.name}}<br>
{{item.qty}} x {{item.price}}
= {{item.qty * item.price}}
</p>

{% endfor %}

<hr>

<h3>Total: Rp {{transaksi.total}}</h3>

<p>Terima kasih</p>

</body>
</html>
